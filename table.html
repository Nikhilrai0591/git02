<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    
    <title>Basic Table</title>
</head>
<body>
    <h2>Simple Table Example</h2>
    <Table border="1">
        <caption><strong>Students Marks</strong></caption>     
        <thead>
        <tr>
            <th rowspan="2">NAME</th>
        
            <th>Maths</th>
            <th>Science</th>         
        </tr>
        </thead>
        <tr>
            <td>Neha</td>
            <td>70</td>
            <td>80</td>
        </tr>
        <tr>
            <td>Riya</td>
            <td>60</td>
            <td>65</td>
        </tr>
        <tr>
            <td>Neil Dua (det.)</td>
            <td>0</td>
            <td>0</td>
        </tr>
        <td>Total Students</td>
        <td colspan = "3">3</td>
        
    </Table>
</body>
</html>
